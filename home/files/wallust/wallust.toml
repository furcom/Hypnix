backend = 'wal'
color_space = 'lch'
palette = 'dark'
saturation = 50
alpha = 100
check_contrast = true

[templates]
cava = { template = 'cava', target = '~/.config/cava/config' }
hyprland = { template = 'hyprland', target = '~/.config/hypr/hypr_colors.conf' }
hyprlock = { template = 'hyprlock', target = '~/.config/hypr/hyprlock.conf' }
hyprpanel = { template = 'hyprpanel', target = '~/.config/hyprpanel/config.json' }
kitty = { template = 'kitty', target = '~/.config/kitty/style.conf' }
oh-my-posh = { template = 'oh-my-posh', target = '~/.config/oh-my-posh/config.yaml' }
rofi = { template = 'rofi', target = '~/.config/rofi/config.rasi' }
waypaper = { template = 'waypaper', target = '~/.config/waypaper/config.ini' }
wlogout = { template = 'wlogout', target = '~/.config/wlogout/style.css' }
